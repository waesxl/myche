<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Checker</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--border:#2a2a3a;
    --text:#e4e4ef;--text2:#8888a0;--accent:#6c5ce7;--accent2:#a29bfe;
    --green:#00e676;--red:#ff5252;--orange:#ffab40;--blue:#40c4ff;--yellow:#ffd740;
    --radius:12px;
  }
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
  .container{max-width:900px;margin:0 auto}

  header{text-align:center;padding:40px 0 30px}
  header h1{font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  header p{color:var(--text2);margin-top:8px;font-size:14px}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px}
  .card-title{font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:16px}

  .drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:40px;text-align:center;cursor:pointer;transition:all .2s}
  .drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:rgba(108,92,231,.05)}
  .drop-zone-icon{font-size:40px;margin-bottom:12px;opacity:.5}
  .drop-zone-text{color:var(--text2);font-size:14px}
  .drop-zone-text span{color:var(--accent2);text-decoration:underline;cursor:pointer}

  textarea{width:100%;min-height:160px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;color:var(--text);font-family:'Cascadia Code','Fira Code',monospace;font-size:13px;resize:vertical;outline:none;transition:border-color .2s;margin-top:12px}
  textarea:focus{border-color:var(--accent)}
  textarea::placeholder{color:var(--text2);opacity:.6}

  .info-bar{display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-size:13px;color:var(--text2)}
  .account-count{background:var(--surface2);padding:4px 12px;border-radius:20px;font-weight:600}

  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;outline:none}
  .btn-primary{background:linear-gradient(135deg,var(--accent),#7c6cf0);color:#fff;width:100%;justify-content:center;margin-top:16px}
  .btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 20px rgba(108,92,231,.4)}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed}
  .btn-sm{padding:6px 14px;font-size:12px;border-radius:6px}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
  .btn-outline:hover{border-color:var(--accent);color:var(--text)}

  .progress-section{display:none}
  .progress-bar-wrap{background:var(--surface2);border-radius:20px;height:8px;overflow:hidden;margin:12px 0}
  .progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--blue));border-radius:20px;transition:width .4s ease;width:0}
  .progress-text{font-size:13px;color:var(--text2);text-align:center}
  .progress-log{max-height:120px;overflow-y:auto;margin-top:12px;font-size:12px;font-family:'Cascadia Code','Fira Code',monospace;color:var(--text2);background:var(--surface2);border-radius:8px;padding:10px}
  .progress-log div{padding:2px 0}
  .progress-log .ok{color:var(--green)}
  .progress-log .err{color:var(--red)}

  .results-section{display:none}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
  .stat{background:var(--surface2);border-radius:10px;padding:16px;text-align:center;border:1px solid var(--border)}
  .stat-count{font-size:28px;font-weight:700;margin-bottom:4px}
  .stat-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text2);font-weight:600}
  .stat.live .stat-count{color:var(--green)}
  .stat.disabled .stat-count{color:var(--red)}
  .stat.notexists .stat-count{color:var(--orange)}
  .stat.verified .stat-count{color:var(--blue)}
  .stat.unknown .stat-count{color:var(--yellow)}

  .tabs{display:flex;gap:4px;background:var(--surface2);border-radius:8px;padding:4px;margin-bottom:16px;flex-wrap:wrap}
  .tab{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;color:var(--text2);border:none;background:none}
  .tab:hover{color:var(--text)}
  .tab.active{background:var(--accent);color:#fff}
  .tab .badge{display:inline-block;min-width:20px;padding:1px 6px;border-radius:10px;font-size:11px;margin-left:4px;background:rgba(255,255,255,.15)}

  .result-list{background:var(--surface2);border-radius:8px;padding:2px;max-height:400px;overflow-y:auto}
  .result-item{padding:10px 14px;font-family:'Cascadia Code','Fira Code',monospace;font-size:13px;border-bottom:1px solid var(--border)}
  .result-item:last-child{border-bottom:none}
  .result-empty{text-align:center;padding:30px;color:var(--text2);font-size:13px}

  .result-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}

  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:var(--text2)}

  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeIn .3s ease}

  .toast{position:fixed;bottom:30px;right:30px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 20px;font-size:13px;color:var(--text);box-shadow:0 8px 30px rgba(0,0,0,.4);transform:translateY(100px);opacity:0;transition:all .3s;z-index:100}
  .toast.show{transform:translateY(0);opacity:1}

  .settings-row{display:flex;gap:12px;align-items:center;margin-top:12px;flex-wrap:wrap}
  .settings-row label{font-size:13px;color:var(--text2)}
  .settings-row input[type=number]{width:70px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:13px;outline:none}
  .settings-row input[type=number]:focus{border-color:var(--accent)}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Email Checker</h1>
    <p>Batch check email accounts status via emailscan.in</p>
  </header>

  <div class="card">
    <div class="card-title">Load Accounts</div>
    <div class="drop-zone" id="dropZone">
      <div class="drop-zone-icon">&#128193;</div>
      <div class="drop-zone-text">Drag & drop file here or <span id="browseBtn">browse</span></div>
    </div>
    <input type="file" id="fileInput" accept=".txt,.csv" style="display:none">
    <textarea id="accountsInput" placeholder="Or paste accounts here (one per line)&#10;&#10;Supported formats:&#10;email@gmail.com&#10;email@gmail.com:password&#10;email@gmail.com;password&#10;email@gmail.com#token:password"></textarea>
    <div class="info-bar">
      <div>Supports formats: <code>login</code>, <code>login:pass</code>, <code>login;pass</code>, <code>login#pass</code>, etc.</div>
      <div class="account-count"><span id="accountCount">0</span> accounts</div>
    </div>
    <div class="settings-row">
      <label>Batch size:</label>
      <input type="number" id="batchSize" value="10" min="1" max="10">
      <label>Delay (sec):</label>
      <input type="number" id="delaySeconds" value="3" min="1" max="30">
    </div>
    <button class="btn btn-primary" id="startBtn" disabled>Start Checking</button>
  </div>

  <div class="card progress-section" id="progressSection">
    <div class="card-title">Progress</div>
    <div class="progress-text" id="progressText">Batch 0 / 0</div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-log" id="progressLog"></div>
  </div>

  <div class="card results-section fade-in" id="resultsSection">
    <div class="card-title">Results</div>
    <div class="stats" id="stats">
      <div class="stat live"><div class="stat-count" id="statLive">0</div><div class="stat-label">Live</div></div>
      <div class="stat disabled"><div class="stat-count" id="statDisabled">0</div><div class="stat-label">Disabled</div></div>
      <div class="stat notexists"><div class="stat-count" id="statNotexists">0</div><div class="stat-label">Not Exists</div></div>
      <div class="stat verified"><div class="stat-count" id="statVerified">0</div><div class="stat-label">Verified</div></div>
      <div class="stat unknown"><div class="stat-count" id="statUnknown">0</div><div class="stat-label">Unknown</div></div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="result-list" id="resultList"></div>
    <div class="result-actions">
      <button class="btn btn-sm btn-outline" id="copyBtn">Copy</button>
      <button class="btn btn-sm btn-outline" id="downloadBtn">Download .txt</button>
      <button class="btn btn-sm btn-outline" id="downloadAllBtn">Download All</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://emailscan.in/api/non/check-products';

const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

const dropZone = $('#dropZone');
const fileInput = $('#fileInput');
const accountsInput = $('#accountsInput');
const accountCount = $('#accountCount');
const startBtn = $('#startBtn');
const progressSection = $('#progressSection');
const progressBar = $('#progressBar');
const progressText = $('#progressText');
const progressLog = $('#progressLog');
const resultsSection = $('#resultsSection');
const tabsEl = $('#tabs');
const resultList = $('#resultList');

let results = { LIVE: [], DISABLED: [], NOTEXISTS: [], VERIFYED: [], UNKNOW: [] };
let activeTab = 'LIVE';
let isRunning = false;

// --- Extract login from line ---
function extractLogin(line) {
  return line.split(/[:;#|,\t ]/)[0].trim();
}

function getAccounts() {
  return accountsInput.value
    .split(/\r?\n/)
    .map(l => l.trim())
    .filter(l => l.length > 0)
    .map(l => extractLogin(l))
    .filter(l => l.length > 0);
}

function updateCount() {
  const count = getAccounts().length;
  accountCount.textContent = count;
  startBtn.disabled = count === 0 || isRunning;
}

accountsInput.addEventListener('input', updateCount);

// --- File handling ---
$('#browseBtn').addEventListener('click', () => fileInput.click());
dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener('change', () => {
  if (fileInput.files.length) loadFile(fileInput.files[0]);
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    accountsInput.value = e.target.result;
    updateCount();
    toast(`Loaded ${getAccounts().length} accounts from ${file.name}`);
  };
  reader.readAsText(file);
}

// --- Compress / Decompress ---
async function compress(data) {
  const json = JSON.stringify(data);
  const stream = new Blob([json]).stream().pipeThrough(new CompressionStream('gzip'));
  const blob = await new Response(stream).blob();
  const buf = await blob.arrayBuffer();
  return btoa(String.fromCharCode(...new Uint8Array(buf)));
}

async function decompress(b64) {
  const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
  const text = await new Response(stream).text();
  return JSON.parse(text);
}

// --- API call ---
async function checkBatch(emails) {
  const compressedData = await compress(emails);
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ compressedData }),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (!json.compressedResult) throw new Error('No compressedResult in response');
  return await decompress(json.compressedResult);
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// --- Main check ---
startBtn.addEventListener('click', runCheck);

async function runCheck() {
  const accounts = getAccounts();
  if (!accounts.length) return;

  const batchSize = parseInt($('#batchSize').value) || 10;
  const delay = (parseInt($('#delaySeconds').value) || 3) * 1000;

  isRunning = true;
  startBtn.disabled = true;
  startBtn.textContent = 'Checking...';

  results = { LIVE: [], DISABLED: [], NOTEXISTS: [], VERIFYED: [], UNKNOW: [] };

  progressSection.style.display = 'block';
  resultsSection.style.display = 'none';
  progressLog.innerHTML = '';

  const batches = [];
  for (let i = 0; i < accounts.length; i += batchSize) {
    batches.push(accounts.slice(i, i + batchSize));
  }

  for (let i = 0; i < batches.length; i++) {
    const batch = batches[i];
    const pct = ((i + 1) / batches.length * 100).toFixed(0);
    progressText.textContent = `Batch ${i + 1} / ${batches.length}`;
    progressBar.style.width = `${((i) / batches.length * 100).toFixed(0)}%`;

    log(`Checking batch ${i + 1}/${batches.length} (${batch.length} accounts)...`);

    try {
      const res = await checkBatch(batch);

      for (const key of Object.keys(results)) {
        if (res[key] && res[key].trim()) {
          results[key].push(...res[key].trim().split('\n'));
        }
      }

      log(`Batch ${i + 1} done: Live=${res.LIVE_COUNT||0} Disabled=${res.DISABLED_COUNT||0} NotExists=${res.NOTEXISTS_COUNT||0}`, 'ok');
    } catch (err) {
      log(`Batch ${i + 1} error: ${err.message}`, 'err');
    }

    progressBar.style.width = `${((i + 1) / batches.length * 100).toFixed(0)}%`;

    if (i < batches.length - 1) {
      log(`Waiting ${delay/1000}s...`);
      await sleep(delay);
    }
  }

  progressText.textContent = 'Done!';
  progressBar.style.width = '100%';

  isRunning = false;
  startBtn.disabled = false;
  startBtn.textContent = 'Start Checking';

  showResults();
}

function log(msg, cls = '') {
  const d = document.createElement('div');
  d.textContent = msg;
  if (cls) d.className = cls;
  progressLog.appendChild(d);
  progressLog.scrollTop = progressLog.scrollHeight;
}

// --- Results ---
const TAB_META = {
  LIVE: { label: 'Live', color: 'var(--green)' },
  DISABLED: { label: 'Disabled', color: 'var(--red)' },
  NOTEXISTS: { label: 'Not Exists', color: 'var(--orange)' },
  VERIFYED: { label: 'Verified', color: 'var(--blue)' },
  UNKNOW: { label: 'Unknown', color: 'var(--yellow)' },
};

function showResults() {
  resultsSection.style.display = 'block';
  resultsSection.classList.remove('fade-in');
  void resultsSection.offsetWidth;
  resultsSection.classList.add('fade-in');

  $('#statLive').textContent = results.LIVE.length;
  $('#statDisabled').textContent = results.DISABLED.length;
  $('#statNotexists').textContent = results.NOTEXISTS.length;
  $('#statVerified').textContent = results.VERIFYED.length;
  $('#statUnknown').textContent = results.UNKNOW.length;

  tabsEl.innerHTML = '';
  const allTab = document.createElement('div');
  allTab.className = 'tab';
  allTab.dataset.tab = 'ALL';
  const total = Object.values(results).reduce((s, a) => s + a.length, 0);
  allTab.innerHTML = `All<span class="badge">${total}</span>`;
  tabsEl.appendChild(allTab);

  for (const [key, meta] of Object.entries(TAB_META)) {
    const tab = document.createElement('div');
    tab.className = 'tab';
    tab.dataset.tab = key;
    tab.innerHTML = `${meta.label}<span class="badge">${results[key].length}</span>`;
    tabsEl.appendChild(tab);
  }

  activeTab = 'ALL';
  updateTabs();

  tabsEl.addEventListener('click', (e) => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    activeTab = tab.dataset.tab;
    updateTabs();
  });
}

function updateTabs() {
  $$('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === activeTab));
  renderList();
}

function renderList() {
  let items = [];
  if (activeTab === 'ALL') {
    for (const [key, list] of Object.entries(results)) {
      list.forEach(email => items.push({ email, type: key }));
    }
  } else {
    items = results[activeTab].map(email => ({ email, type: activeTab }));
  }

  if (!items.length) {
    resultList.innerHTML = '<div class="result-empty">No accounts in this category</div>';
    return;
  }

  resultList.innerHTML = items.map(({ email, type }) => {
    const meta = TAB_META[type];
    return `<div class="result-item"><span style="color:${meta.color};margin-right:8px">&bull;</span>${email} <span style="float:right;color:${meta.color};font-size:11px;opacity:.7">${meta.label}</span></div>`;
  }).join('');
}

function getCurrentList() {
  if (activeTab === 'ALL') {
    const lines = [];
    for (const [key, list] of Object.entries(results)) {
      list.forEach(e => lines.push(`${TAB_META[key].label}|${e}`));
    }
    return lines;
  }
  return results[activeTab] || [];
}

$('#copyBtn').addEventListener('click', () => {
  const text = getCurrentList().join('\n');
  navigator.clipboard.writeText(text).then(() => toast('Copied to clipboard!'));
});

$('#downloadBtn').addEventListener('click', () => {
  const text = getCurrentList().join('\n');
  const name = activeTab === 'ALL' ? 'all_results' : activeTab.toLowerCase();
  download(`${name}.txt`, text);
});

$('#downloadAllBtn').addEventListener('click', () => {
  for (const [key, list] of Object.entries(results)) {
    if (list.length) download(`${key.toLowerCase()}.txt`, list.join('\n'));
  }
  toast('Downloaded all result files');
});

function download(filename, content) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: 'text/plain' }));
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function toast(msg) {
  const el = $('#toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

updateCount();
</script>
</body>
</html>
